<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Phone Panel</title>
  <link rel="manifest" href="/static/manifest.json" />
  <style>
    :root {
      --bg: #0b1020;
      --card: #1a2238;
      --text: #f3f4f6;
      --muted: #94a3b8;
      --ok: #10b981;
      --err: #ef4444;
      --gap: 12px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; }
    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
              env(safe-area-inset-bottom) env(safe-area-inset-left);
      display: flex; flex-direction: column;
    }
    #grid {
      flex: 1; display: grid; gap: var(--gap); padding: var(--gap);
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      grid-auto-rows: minmax(110px, 160px);
      align-content: start;
      overflow-y: auto;
    }
    .btn {
      border: none; border-radius: 16px; color: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; cursor: pointer; font: inherit;
      transition: transform .08s ease, opacity .15s ease, filter .15s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      min-height: 100px;
    }
    .btn:active { transform: scale(.94); filter: brightness(1.15); }
    .btn.pending { opacity: .55; filter: saturate(.6); }
    .btn.ok { animation: flashOk .5s ease; }
    .btn.err { animation: flashErr .5s ease; }
    .btn .icon { font-size: 38px; line-height: 1; }
    .btn .label { font-size: 13px; opacity: .95; max-width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 6px; }
    @keyframes flashOk { 0% { box-shadow: 0 0 0 0 var(--ok); }
      50% { box-shadow: 0 0 0 6px var(--ok); } 100% { box-shadow: 0 2px 8px rgba(0,0,0,.3); } }
    @keyframes flashErr { 0% { box-shadow: 0 0 0 0 var(--err); }
      50% { box-shadow: 0 0 0 6px var(--err); } 100% { box-shadow: 0 2px 8px rgba(0,0,0,.3); } }

    #empty { padding: 24px; text-align: center; color: var(--muted); }
    #empty a { color: #60a5fa; }

    #toast {
      position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 16px);
      transform: translateX(-50%) translateY(20px); opacity: 0;
      background: var(--card); padding: 10px 16px; border-radius: 12px;
      font-size: 13px; pointer-events: none; transition: all .2s ease;
      max-width: 80vw; white-space: pre-wrap; word-break: break-all;
      border: 1px solid #334155;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.err { border-color: var(--err); }
    #toast.ok { border-color: var(--ok); }

    #fab {
      position: fixed; right: 12px; top: calc(env(safe-area-inset-top) + 8px);
      width: 36px; height: 36px; border-radius: 50%; border: 1px solid #334155;
      background: rgba(26,34,56,.6); color: var(--muted); font-size: 16px;
      display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
  <div id="grid"></div>
  <button id="fab" title="刷新">↻</button>
  <div id="toast"></div>

  <script>
    const TOKEN_KEY = "phone-panel-token";
    const grid = document.getElementById("grid");
    const toastEl = document.getElementById("toast");

    // 1. 从 URL 取 token；若有则持久化；否则用 localStorage 的
    const urlToken = new URL(location.href).searchParams.get("token");
    if (urlToken) localStorage.setItem(TOKEN_KEY, urlToken);
    const token = localStorage.getItem(TOKEN_KEY);

    function vibrate(ms) {
      if (navigator.vibrate) try { navigator.vibrate(ms); } catch {}
    }

    let toastTimer;
    function toast(msg, kind) {
      toastEl.textContent = msg;
      toastEl.className = "show " + (kind || "");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toastEl.className = toastEl.className.replace("show", "").trim();
      }, 2000);
    }

    async function api(method, path, body) {
      const res = await fetch(path, {
        method,
        headers: {
          "content-type": "application/json",
          ...(token ? { "x-panel-token": token } : {}),
        },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!res.ok) {
        const t = await res.text().catch(() => "");
        throw new Error(`${res.status} ${t || res.statusText}`);
      }
      return res.json();
    }

    function renderEmpty(msg) {
      grid.innerHTML = `<div id="empty" style="grid-column:1/-1">${msg}</div>`;
    }

    function renderButtons(buttons) {
      if (!buttons.length) {
        renderEmpty("还没有按钮，去电脑端 <a href='/admin' target='_blank'>/admin</a> 添加。");
        return;
      }
      grid.innerHTML = "";
      for (const b of buttons) {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.style.background = b.color || "#334155";
        btn.dataset.id = b.id;
        btn.innerHTML = `<div class="icon">${escapeHtml(b.icon || "·")}</div>
                         <div class="label">${escapeHtml(b.label || "")}</div>`;
        btn.addEventListener("click", () => trigger(btn, b));
        grid.appendChild(btn);
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    async function trigger(btnEl, btn) {
      if (btnEl.classList.contains("pending")) return;
      vibrate(20);
      btnEl.classList.add("pending");
      try {
        const r = await api("POST", `/api/execute/${btn.id}`);
        btnEl.classList.remove("pending");
        if (r.ok) {
          btnEl.classList.add("ok");
          setTimeout(() => btnEl.classList.remove("ok"), 600);
          toast(`${btn.label} ✓ ${r.durationMs}ms`, "ok");
          vibrate([10, 30, 10]);
        } else {
          btnEl.classList.add("err");
          setTimeout(() => btnEl.classList.remove("err"), 600);
          toast(`${btn.label} 失败: ${r.error || r.stderr || "unknown"}`, "err");
          vibrate([60, 40, 60]);
        }
      } catch (err) {
        btnEl.classList.remove("pending");
        btnEl.classList.add("err");
        setTimeout(() => btnEl.classList.remove("err"), 600);
        toast("请求失败: " + err.message, "err");
        vibrate([80, 40, 80]);
      }
    }

    async function load() {
      if (!token) {
        renderEmpty("缺少 token，请到电脑端扫描二维码进入。");
        return;
      }
      try {
        const cfg = await api("GET", "/api/config");
        renderButtons(cfg.buttons || []);
      } catch (err) {
        renderEmpty("加载失败: " + err.message + "<br/>请到电脑端 /admin 重新扫码。");
      }
    }

    document.getElementById("fab").addEventListener("click", load);
    load();

    // 防止双击缩放
    document.addEventListener("dblclick", (e) => e.preventDefault(), { passive: false });
  </script>
</body>
</html>
