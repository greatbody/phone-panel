<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Phone Panel · Admin</title>
  <style>
    :root {
      --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --muted: #64748b;
      --border: #e2e8f0; --primary: #2563eb; --danger: #dc2626;
      --ok: #059669; --err: #dc2626;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI",
      "PingFang SC", sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }
    h1 { margin: 0 0 4px; font-size: 22px; }
    .sub { color: var(--muted); margin-bottom: 20px; font-size: 13px; }
    .grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px; }
    .card h2 { margin: 0 0 12px; font-size: 15px; color: var(--muted);
      text-transform: uppercase; letter-spacing: .04em; }
    .qr { text-align: center; }
    .qr svg { width: 220px; height: 220px; background: #fff; border-radius: 8px; }
    .qr .url { word-break: break-all; font-size: 11px; color: var(--muted);
      margin-top: 8px; font-family: ui-monospace, Menlo, monospace; }
    .meta { font-size: 12px; color: var(--muted); }
    .meta div { margin: 4px 0; word-break: break-all; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    button { font: inherit; cursor: pointer; padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: #fff; }
    button.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    button.danger { background: var(--danger); border-color: var(--danger); color: #fff; }
    button.ghost { background: transparent; }
    button:hover { filter: brightness(.96); }
    .btn-list { display: flex; flex-direction: column; gap: 8px; }
    .btn-row { display: grid;
      grid-template-columns: 28px 56px 1fr 100px 1fr auto; gap: 8px;
      align-items: center; padding: 8px; border: 1px solid var(--border);
      border-radius: 10px; background: #fafafa; }
    .btn-row.dragging { opacity: .4; }
    .handle { cursor: grab; color: var(--muted); text-align: center; user-select: none;
      padding: 4px 0; border-radius: 6px; font-size: 18px; line-height: 1; }
    .handle:hover { background: #e2e8f0; color: var(--text); }
    .handle:active { cursor: grabbing; }
    .preview { width: 48px; height: 48px; border-radius: 10px; display: flex;
      align-items: center; justify-content: center; color: #fff; font-size: 26px;
      cursor: pointer; position: relative; overflow: hidden; flex-shrink: 0;
      border: 1px solid transparent; transition: border-color .15s ease; }
    .preview:hover { border-color: var(--primary); }
    .preview img { width: 100%; height: 100%; object-fit: contain; }
    .preview .edit-hint {
      position: absolute; inset: 0; background: rgba(0,0,0,.55); color: #fff;
      font-size: 11px; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s ease;
    }
    .preview:hover .edit-hint { opacity: 1; }
    .btn-row input, .btn-row select, .btn-row textarea {
      font: inherit; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px;
      width: 100%; background: #fff;
    }
    .btn-row textarea { resize: vertical; min-height: 32px; font-family: ui-monospace, Menlo, monospace;
      font-size: 12px; }
    .actions { display: flex; gap: 4px; }
    .actions button { padding: 4px 8px; font-size: 12px; }
    .add-bar { margin-top: 12px; display: flex; gap: 8px; justify-content: space-between; }

    /* ---- 图标编辑弹窗 ---- */
    .modal-mask {
      position: fixed; inset: 0; background: rgba(15,23,42,.55); z-index: 50;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal {
      background: var(--card); border-radius: 12px; width: 100%; max-width: 460px;
      padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,.2);
    }
    .modal h3 { margin: 0 0 14px; font-size: 16px; }
    .modal .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border);
      margin-bottom: 14px; }
    .modal .tab { padding: 8px 14px; border: none; border-bottom: 2px solid transparent;
      background: transparent; cursor: pointer; color: var(--muted); font: inherit; }
    .modal .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .modal .body { min-height: 180px; }
    .modal .row-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .icon-current {
      display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
      padding: 10px; background: #f8fafc; border-radius: 8px;
    }
    .icon-current .preview { cursor: default; }
    .drop-zone {
      display: block;
      border: 2px dashed var(--border); border-radius: 10px; padding: 28px;
      text-align: center; color: var(--muted); cursor: pointer;
      transition: all .15s ease;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--primary); background: #eff6ff; color: var(--primary);
    }
    .drop-zone input[type=file] { display: none; }
    #toast { position: fixed; right: 20px; bottom: 20px; background: #111827; color: #fff;
      padding: 10px 14px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity .2s;
      max-width: 360px; white-space: pre-wrap; }
    #toast.show { opacity: 1; }
    #toast.ok { background: var(--ok); }
    #toast.err { background: var(--err); }
    code { background: #e2e8f0; padding: 1px 5px; border-radius: 4px;
      font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
    .hint { color: var(--muted); font-size: 12px; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Phone Panel · Admin</h1>
    <div class="sub">配置按钮，手机扫码即可远程触发 macOS 命令。</div>

    <div class="grid">
      <!-- 左：配对 + 元信息 -->
      <div>
        <div class="card qr">
          <h2>扫码配对</h2>
          <div id="qr"></div>
          <div class="url" id="panelUrl"></div>
          <div class="row" style="justify-content:center;margin-top:10px">
            <button id="copyUrl" class="ghost">复制链接</button>
            <button id="rotate" class="ghost">重置 token</button>
          </div>
        </div>

        <div class="card" style="margin-top:14px">
          <h2>状态</h2>
          <div class="meta" id="meta"></div>
          <div class="hint" style="margin-top:8px">
            提示：要让 <code>keystroke</code> / <code>open</code> 生效，需要在
            <b>系统设置 → 隐私与安全 → 辅助功能/输入监控</b> 里授予你的终端或 Bun 权限。
          </div>
        </div>
      </div>

      <!-- 右：按钮列表 -->
      <div class="card">
        <h2>按钮 <span id="btnCount" style="color:var(--muted);font-size:12px"></span></h2>
        <div class="btn-list" id="btnList"></div>
        <div class="add-bar">
          <button id="add" class="primary">+ 新增按钮</button>
          <div class="row">
            <button id="save" class="primary">保存全部更改</button>
            <button id="reload" class="ghost">放弃更改</button>
          </div>
        </div>
        <div class="hint">点 <b>试运行</b> 在电脑本机执行该命令以验证；点 <b>↑↓</b> 调整顺序。改完记得点保存。</div>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const ACTION_TYPES = [
      { value: "shell", label: "Shell", placeholder: "例: open ~/Downloads" },
      { value: "open", label: "Open", placeholder: "App 名 / 路径 / URL，例: Safari 或 https://x.com" },
      { value: "applescript", label: "AppleScript", placeholder: "tell application \"Music\" to playpause" },
      { value: "keystroke", label: "快捷键", placeholder: "cmd+shift+4" },
    ];

    const toastEl = document.getElementById("toast");
    let toastTimer;
    function toast(msg, kind) {
      toastEl.textContent = msg;
      toastEl.className = "show " + (kind || "");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => (toastEl.className = ""), 2500);
    }

    async function api(method, path, body) {
      const res = await fetch(path, {
        method,
        headers: { "content-type": "application/json" },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!res.ok) throw new Error(`${res.status} ${await res.text().catch(() => "")}`);
      return res.json();
    }

    let state = { buttons: [], token: "", port: 7788 };
    let dirty = false;

    function markDirty() { dirty = true; }

    function uuid() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return "id-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function renderQR(qr) {
      // qrcode-svg 生成的 SVG 只有固定 width/height，没有 viewBox，
      // 我们在 CSS 里缩放它时浏览器会按原始 256 渲染并裁剪。
      // 注入 viewBox + preserveAspectRatio 让它跟随 CSS 尺寸缩放。
      let svg = qr.svg;
      if (!/viewBox=/.test(svg)) {
        const m = svg.match(/<svg[^>]*\swidth="([^"]+)"[^>]*\sheight="([^"]+)"/);
        if (m) {
          const w = m[1], h = m[2];
          svg = svg.replace(/<svg/, `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet"`);
        }
      }
      document.getElementById("qr").innerHTML = svg;
      document.getElementById("panelUrl").textContent = qr.url;
      document.getElementById("copyUrl").onclick = () => {
        navigator.clipboard.writeText(qr.url);
        toast("链接已复制", "ok");
      };
    }

    function renderMeta(cfg, configPath) {
      document.getElementById("meta").innerHTML = `
        <div><b>token:</b> <code>${escapeHtml(cfg.token)}</code></div>
        <div><b>port:</b> <code>${cfg.port}</code></div>
      `;
    }

    function renderPreviewInner(b, withHint) {
      const isImage = b.iconType === "image" && b.id;
      if (isImage) {
        // 加 ?v=<hash> 让浏览器在保存图标后强制刷新
        const v = b._iconVersion || "";
        return `<img src="/icons/${encodeURIComponent(b.id)}.png?v=${v}" alt="icon" />` +
          (withHint ? '<div class="edit-hint">编辑</div>' : "");
      }
      return `<span>${escapeHtml(b.icon || "·")}</span>` +
        (withHint ? '<div class="edit-hint">编辑</div>' : "");
    }

    function renderButtons() {
      const list = document.getElementById("btnList");
      list.innerHTML = "";
      document.getElementById("btnCount").textContent = `(${state.buttons.length})`;
      state.buttons.forEach((b, idx) => {
        const row = document.createElement("div");
        row.className = "btn-row";
        // 拖拽源只挂在 .handle 上（不能整行 draggable，否则在输入框选字会触发拖拽）
        row.dataset.idx = idx;
        const typeOptions = ACTION_TYPES.map(t =>
          `<option value="${t.value}" ${b.type === t.value ? "selected" : ""}>${t.label}</option>`).join("");
        const placeholder = ACTION_TYPES.find(t => t.value === b.type)?.placeholder ?? "";
        row.innerHTML = `
          <div class="handle" title="按住拖拽排序" draggable="true">≡</div>
          <div class="preview" style="background:${escapeHtml(b.color)}" data-act="editIcon">${renderPreviewInner(b, true)}</div>
          <div class="row" style="display:grid;grid-template-columns:1fr 50px;gap:4px">
            <input data-k="label" value="${escapeHtml(b.label)}" placeholder="标签" />
            <input data-k="color" type="color" value="${escapeHtml(b.color)}" />
          </div>
          <select data-k="type">${typeOptions}</select>
          <textarea data-k="command" rows="1" placeholder="${escapeHtml(placeholder)}">${escapeHtml(b.command)}</textarea>
          <div class="actions">
            <button data-act="run" title="试运行">▶</button>
            <button data-act="up" title="上移">↑</button>
            <button data-act="down" title="下移">↓</button>
            <button data-act="del" class="danger" title="删除">✕</button>
          </div>
        `;
        // 字段变更
        row.querySelectorAll("input,select,textarea").forEach(el => {
          el.addEventListener("input", () => {
            const k = el.dataset.k;
            b[k] = el.value;
            if (k === "color") {
              row.querySelector(".preview").style.background = b.color;
            }
            if (k === "type") {
              const ph = ACTION_TYPES.find(t => t.value === b.type)?.placeholder ?? "";
              row.querySelector("textarea").placeholder = ph;
            }
            markDirty();
          });
        });
        // 点 preview 打开图标编辑弹窗
        row.querySelector('[data-act="editIcon"]').onclick = () => openIconEditor(b, idx);
        // 动作按钮
        row.querySelector('[data-act="del"]').onclick = () => {
          if (!confirm(`删除 "${b.label}"？`)) return;
          state.buttons.splice(idx, 1);
          renderButtons();
          markDirty();
        };
        row.querySelector('[data-act="up"]').onclick = () => {
          if (idx === 0) return;
          [state.buttons[idx - 1], state.buttons[idx]] = [state.buttons[idx], state.buttons[idx - 1]];
          renderButtons();
          markDirty();
        };
        row.querySelector('[data-act="down"]').onclick = () => {
          if (idx === state.buttons.length - 1) return;
          [state.buttons[idx + 1], state.buttons[idx]] = [state.buttons[idx], state.buttons[idx + 1]];
          renderButtons();
          markDirty();
        };
        row.querySelector('[data-act="run"]').onclick = async () => {
          if (!b.id) { toast("先保存再试运行", "err"); return; }
          try {
            const r = await api("POST", `/api/execute/${b.id}`);
            if (r.ok) toast(`✓ ${b.label} (${r.durationMs}ms)${r.stdout ? "\n" + r.stdout : ""}`, "ok");
            else toast(`✕ ${b.label}: ${r.error || r.stderr || "fail"}`, "err");
          } catch (e) { toast(e.message, "err"); }
        };
        // 拖拽排序：dragstart 只挂在 handle 上；用 setDragImage 把整行作为预览。
        // row 本身仍要响应 dragover/drop 作为放置目标。
        const handle = row.querySelector(".handle");
        handle.addEventListener("dragstart", (e) => {
          row.classList.add("dragging");
          e.dataTransfer.setData("text/plain", String(idx));
          e.dataTransfer.effectAllowed = "move";
          // 浏览器默认会用 handle 自身那个小图标当 drag image，太丑——用整行替代
          if (e.dataTransfer.setDragImage) {
            e.dataTransfer.setDragImage(row, 20, row.offsetHeight / 2);
          }
        });
        handle.addEventListener("dragend", () => row.classList.remove("dragging"));
        row.addEventListener("dragover", (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; });
        row.addEventListener("drop", (e) => {
          e.preventDefault();
          const from = Number(e.dataTransfer.getData("text/plain"));
          const to = idx;
          if (Number.isNaN(from) || from === to) return;
          const [moved] = state.buttons.splice(from, 1);
          state.buttons.splice(to, 0, moved);
          renderButtons();
          markDirty();
        });

        list.appendChild(row);
      });
    }

    async function refreshQR() {
      try {
        const qr = await api("GET", "/api/admin/qrcode");
        renderQR(qr);
      } catch (e) { toast("二维码加载失败: " + e.message, "err"); }
    }

    async function load() {
      const cfg = await api("GET", "/api/admin/config");
      state = cfg;
      dirty = false;
      renderButtons();
      renderMeta(cfg);
      await refreshQR();
    }

    document.getElementById("add").onclick = () => {
      state.buttons.push({
        id: "", label: "新按钮", icon: "✨", color: "#6366f1",
        type: "shell", command: "",
      });
      renderButtons();
      markDirty();
    };

    document.getElementById("save").onclick = async () => {
      try {
        const r = await api("PUT", "/api/admin/buttons", { buttons: state.buttons });
        state.buttons = r.buttons;
        dirty = false;
        renderButtons();
        toast("已保存", "ok");
      } catch (e) { toast("保存失败: " + e.message, "err"); }
    };

    document.getElementById("reload").onclick = async () => {
      if (dirty && !confirm("放弃未保存更改？")) return;
      await load();
      toast("已重新载入", "ok");
    };

    document.getElementById("rotate").onclick = async () => {
      if (!confirm("重置 token 会使现有手机端断开（需重新扫码）。继续？")) return;
      try {
        await api("POST", "/api/admin/rotate-token");
        await load();
        toast("token 已重置", "ok");
      } catch (e) { toast("重置失败: " + e.message, "err"); }
    };

    window.addEventListener("beforeunload", (e) => {
      if (dirty) { e.preventDefault(); e.returnValue = ""; }
    });

    // ---------- 图标编辑弹窗 ----------
    function openIconEditor(btn, idx) {
      // 如果是新按钮还没保存（无 id），先要求保存
      if (!btn.id) {
        toast("新按钮请先点「保存全部更改」，再来编辑图标", "err");
        return;
      }
      if (dirty) {
        toast("有未保存改动，请先点「保存全部更改」再编辑图标", "err");
        return;
      }
      const mask = document.createElement("div");
      mask.className = "modal-mask";
      mask.innerHTML = `
        <div class="modal" role="dialog">
          <h3>编辑图标 — ${escapeHtml(btn.label || btn.id)}</h3>
          <div class="icon-current">
            <div class="preview" style="background:${escapeHtml(btn.color)}" id="modalPreview">${renderPreviewInner(btn, false)}</div>
            <div>
              <div style="font-weight:500">${escapeHtml(btn.label)}</div>
              <div style="color:var(--muted);font-size:12px">当前：${btn.iconType === "image" ? "图片" : "Emoji"}</div>
            </div>
          </div>
          <div class="tabs">
            <button class="tab ${btn.iconType !== "image" ? "active" : ""}" data-tab="emoji">Emoji</button>
            <button class="tab ${btn.iconType === "image" ? "active" : ""}" data-tab="image">图片</button>
          </div>
          <div class="body">
            <div data-pane="emoji" style="${btn.iconType === "image" ? "display:none" : ""}">
              <label style="display:block;color:var(--muted);font-size:12px;margin-bottom:6px">
                输入或粘贴 emoji / 单字（推荐 1~2 字符）
              </label>
              <input id="emojiInput" type="text" maxlength="4" value="${escapeHtml(btn.icon)}"
                     style="font:inherit;padding:10px 12px;border:1px solid var(--border);
                            border-radius:6px;width:100%;font-size:32px;text-align:center" />
              <div class="hint" style="margin-top:8px">
                Mac 上按 <code>Ctrl+Cmd+空格</code> 调出 emoji 选择器。
              </div>
            </div>
            <div data-pane="image" style="${btn.iconType === "image" ? "" : "display:none"}">
              <label class="drop-zone" id="dropZone">
                <div style="font-size:24px;margin-bottom:6px">📁</div>
                <div>点击或拖拽图片到这里</div>
                <div class="hint" style="margin-top:4px">支持 png/jpg/gif/svg/icns；服务器会压到 256×256 PNG</div>
                <input type="file" id="fileInput" accept="image/*,.icns" />
              </label>
              ${btn.iconType === "image" ? `
                <div style="text-align:center;margin-top:12px">
                  <button class="ghost" id="removeImageBtn" style="color:var(--danger)">移除图片图标（回退到 emoji）</button>
                </div>` : ""}
            </div>
          </div>
          <div class="row-buttons">
            <button class="ghost" data-act="cancel">取消</button>
            <button class="primary" data-act="ok">完成</button>
          </div>
        </div>
      `;
      document.body.appendChild(mask);

      let currentTab = btn.iconType === "image" ? "image" : "emoji";
      let stagedEmoji = btn.icon;

      function close() { mask.remove(); }
      mask.addEventListener("click", (e) => { if (e.target === mask) close(); });

      mask.querySelectorAll(".tab").forEach(t => {
        t.onclick = () => {
          currentTab = t.dataset.tab;
          mask.querySelectorAll(".tab").forEach(x => x.classList.toggle("active", x === t));
          mask.querySelectorAll("[data-pane]").forEach(p => {
            p.style.display = p.dataset.pane === currentTab ? "" : "none";
          });
        };
      });

      mask.querySelector("#emojiInput")?.addEventListener("input", (e) => {
        stagedEmoji = e.target.value;
      });

      const fileInput = mask.querySelector("#fileInput");
      const dropZone = mask.querySelector("#dropZone");
      dropZone?.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
      dropZone?.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
      dropZone?.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        const f = e.dataTransfer.files?.[0];
        if (f) uploadIcon(f);
      });
      fileInput?.addEventListener("change", (e) => {
        const f = e.target.files?.[0];
        if (f) uploadIcon(f);
      });

      async function uploadIcon(file) {
        try {
          const fd = new FormData();
          fd.append("icon", file);
          const res = await fetch(`/api/admin/buttons/${btn.id}/icon`, { method: "POST", body: fd });
          if (!res.ok) throw new Error(`${res.status} ${await res.text().catch(() => "")}`);
          // 服务器已更新 iconType=image。立即刷新本地 state 并关闭。
          btn.iconType = "image";
          btn._iconVersion = Date.now().toString(36); // 防缓存
          // 不算 dirty，因为已经写盘
          renderButtons();
          toast("图标已更新", "ok");
          close();
        } catch (e) {
          toast("上传失败: " + e.message, "err");
        }
      }

      mask.querySelector("#removeImageBtn")?.addEventListener("click", async () => {
        if (!confirm("移除图片图标，回退到 emoji？")) return;
        try {
          const res = await fetch(`/api/admin/buttons/${btn.id}/icon`, { method: "DELETE" });
          if (!res.ok) throw new Error(`${res.status} ${await res.text().catch(() => "")}`);
          btn.iconType = "emoji";
          renderButtons();
          toast("已移除图片图标", "ok");
          close();
        } catch (e) {
          toast("移除失败: " + e.message, "err");
        }
      });

      mask.querySelector('[data-act="cancel"]').onclick = close;
      mask.querySelector('[data-act="ok"]').onclick = () => {
        if (currentTab === "emoji") {
          // emoji 变化需要走保存
          if (stagedEmoji !== btn.icon) {
            btn.icon = stagedEmoji;
            // 如果之前是 image，切回 emoji——但保留图片文件直到下次显式移除
            if (btn.iconType !== "image") btn.iconType = "emoji";
            renderButtons();
            markDirty();
            toast("emoji 已修改，记得点保存", "ok");
          }
        }
        close();
      };
    }
    // ---------- end 图标编辑 ----------

    load().catch((e) => toast("初始化失败: " + e.message, "err"));
  </script>
</body>
</html>
